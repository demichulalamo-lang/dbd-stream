<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBD OBS Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;overflow:hidden}
:root{
  --gold:#d4a017;--gold2:#f0c040;
  --red:#c0392b;--red2:#e74c3c;
  --text:#e8e0d0;--text2:#a0958a;--text3:#6b6055;
}

/* ---- WAITING SCREEN ---- */
#waiting{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:transparent;flex-direction:column;gap:1rem;
}
.waiting-box{
  background:rgba(10,10,15,0.85);border:1px solid rgba(212,160,23,0.3);
  padding:1.5rem 2rem;text-align:center;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);
  backdrop-filter:blur(8px);
}
.waiting-icon{font-size:2.5rem;margin-bottom:0.5rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.waiting-text{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold2);letter-spacing:0.2em;text-transform:uppercase}
.waiting-sub{color:var(--text3);font-size:0.75rem;margin-top:0.3rem;letter-spacing:0.1em}

/* ---- WHEEL CONTAINER ---- */
#wheel-container{
  position:fixed;inset:0;display:none;
  align-items:center;justify-content:center;
  background:transparent;flex-direction:column;gap:1.5rem;
}
#wheel-container.show{display:flex}

.wheel-outer{position:relative;display:inline-block}
canvas#main-canvas{
  display:block;border-radius:50%;
  filter:drop-shadow(0 0 30px rgba(192,57,43,0.6)) drop-shadow(0 0 60px rgba(192,57,43,0.25));
}
.pointer{
  position:absolute;left:50%;top:-20px;transform:translateX(-50%);
  width:0;height:0;
  border-left:16px solid transparent;
  border-right:16px solid transparent;
  border-top:32px solid var(--gold2);
  filter:drop-shadow(0 0 8px var(--gold));
  z-index:10;
}
.center-btn{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:100px;height:100px;
  background:rgba(10,10,15,0.95);border:3px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  z-index:10;cursor:pointer;transition:all 0.2s;
}
.center-btn:hover{border-color:var(--gold2);box-shadow:0 0 20px rgba(212,160,23,0.5);background:rgba(15,15,24,0.98)}
.center-btn.spinning{cursor:not-allowed;opacity:0.7}
.center-icon{font-size:2rem;line-height:1;pointer-events:none}
.center-label{font-family:'Cinzel',serif;font-size:0.5rem;letter-spacing:0.1em;color:var(--gold);text-transform:uppercase;margin-top:3px;pointer-events:none}

/* ---- RESULT BOX ---- */
.result-box{
  background:rgba(10,10,15,0.92);border:2px solid var(--gold);
  border-top:3px solid var(--red);
  padding:1rem 2.5rem;text-align:center;
  min-width:420px;max-width:80vw;
  clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);
  backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
}
.result-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--gold2),transparent);
}
.result-type{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--text3);margin-bottom:0.3rem}
.result-name{font-family:'Cinzel',serif;font-size:1.7rem;color:var(--gold2);line-height:1.15;text-shadow:0 0 20px rgba(240,192,64,0.3)}
.result-desc{color:var(--text2);font-size:0.82rem;margin-top:0.3rem;line-height:1.3}

/* ---- WINNER FLASH ---- */
.winner-flash{
  position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,rgba(212,160,23,0.15) 0%,transparent 70%);
  opacity:0;transition:opacity 0.3s;
}
.winner-flash.show{opacity:1}

/* ---- SPARKS ---- */
.sparks-container{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.spark{position:absolute;border-radius:50%;animation:spark 1.2s ease-out forwards}
@keyframes spark{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

/* ---- TYPE LABEL ---- */
.type-label{
  font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:0.25em;
  color:var(--gold);text-transform:uppercase;
  text-shadow:0 0 12px rgba(212,160,23,0.5);
  margin-bottom:0.25rem;
}

/* ---- RESPONSIVE ---- */
@media(max-width:600px){
  .result-box{min-width:280px;padding:0.8rem 1.5rem}
  .result-name{font-size:1.2rem}
}
</style>
</head>
<body>

<div class="sparks-container" id="sparks"></div>
<div class="winner-flash" id="winner-flash"></div>

<!-- WAITING -->
<div id="waiting">
  <div class="waiting-box">
    <div class="waiting-icon">⚙️</div>
    <div class="waiting-text">Vista OBS Lista</div>
    <div class="waiting-sub">Selecciona una ruleta desde el panel principal</div>
  </div>
</div>

<!-- WHEEL -->
<div id="wheel-container">
  <div class="type-label" id="type-label"></div>
  <div class="wheel-outer">
    <div class="pointer"></div>
    <canvas id="main-canvas" width="480" height="480"></canvas>
    <div class="center-btn" id="center-btn" onclick="spinWheel()">
      <div class="center-icon" id="center-icon">🎰</div>
      <div class="center-label">GIRAR</div>
    </div>
  </div>
  <div class="result-box">
    <div class="result-type" id="result-type">Selección</div>
    <div class="result-name" id="result-name">—</div>
    <div class="result-desc" id="result-desc">Haz clic en el centro o en el panel para girar</div>
  </div>
</div>

<script>
const WHEEL_COLORS=[
  ['#8B1A1A','#C0392B'],['#1A3A8B','#2980B9'],['#1A8B3A','#27AE60'],
  ['#7B1A8B','#9B59B6'],['#8B5A1A','#D4A017'],['#1A7B8B','#1ABC9C'],
  ['#8B3A1A','#E67E22'],['#3A1A8B','#8E44AD'],['#1A8B5A','#2ECC71'],
  ['#8B1A5A','#E91E8C'],['#5A8B1A','#7DC21E'],['#1A5A8B','#3498DB'],
];

let items=[];
let angle=0;
let spinning=false;
let currentType=null;

const ICONS={surv:'🔵',kill:'🔴',killer:'💀'};
const LABELS={surv:'Perks de Superviviente',kill:'Perks de Asesino',killer:'Asesinos'};

function drawWheel(){
  const canvas=document.getElementById('main-canvas');
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,r=w/2-6;
  ctx.clearRect(0,0,w,h);
  if(!items.length)return;
  const n=items.length;
  const arc=Math.PI*2/n;
  items.forEach((item,i)=>{
    const start=angle+i*arc,end=start+arc;
    const colors=WHEEL_COLORS[i%WHEEL_COLORS.length];
    const grad=ctx.createRadialGradient(cx,cy,r*0.12,cx,cy,r);
    grad.addColorStop(0,colors[0]);grad.addColorStop(1,colors[1]);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=2;ctx.stroke();
    // Text
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,0.95)';ctx.shadowBlur=6;
    const maxW=r-42,name=item.name;
    let fs=Math.min(15,Math.max(7,Math.floor(arc*r*0.65/Math.max(name.length,1)*2.8)));
    ctx.font=`bold ${fs}px Rajdhani,sans-serif`;
    while(ctx.measureText(name).width>maxW&&fs>7){fs--;ctx.font=`bold ${fs}px Rajdhani,sans-serif`;}
    ctx.fillText(name,r-12,fs/3);
    ctx.restore();
    // Divider line
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start);
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(r*0.08,0);ctx.lineTo(r,0);ctx.stroke();
    ctx.restore();
  });
  // Outer gold ring
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(212,160,23,0.9)';ctx.lineWidth=6;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r-6,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=2;ctx.stroke();
  // Shine overlay
  const shine=ctx.createRadialGradient(cx-r*0.25,cy-r*0.25,0,cx,cy,r*0.7);
  shine.addColorStop(0,'rgba(255,255,255,0.08)');shine.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=shine;ctx.fill();
}

function spinWheel(){
  if(spinning||!items.length)return;
  spinning=true;
  const btn=document.getElementById('center-btn');
  btn.classList.add('spinning');

  const winnerIdx=Math.floor(Math.random()*items.length);
  const winner=items[winnerIdx];
  const arc=Math.PI*2/items.length;
  const extraSpins=(5+Math.floor(Math.random()*5))*Math.PI*2;
  const winnerCenter=winnerIdx*arc+arc/2;
  const currentMod=angle%(Math.PI*2);
  const needed=(Math.PI*2-winnerCenter-Math.PI/2-currentMod+Math.PI*2*4)%(Math.PI*2);
  const targetDelta=extraSpins+needed;

  const duration=4500+Math.random()*1000;
  const startAngle=angle;
  const startTime=performance.now();
  function easeOut(t){return 1-Math.pow(1-t,4.5);}

  function animate(now){
    const t=Math.min((now-startTime)/duration,1);
    angle=startAngle+targetDelta*easeOut(t);
    drawWheel();
    if(t<1){requestAnimationFrame(animate);}
    else{
      spinning=false;
      btn.classList.remove('spinning');
      showResult(winner);
      // Broadcast result to panel
      try{localStorage.setItem('dbd_obs_result_'+currentType,JSON.stringify({name:winner.name,desc:winner.desc||winner.power||'',time:Date.now()}));}catch(e){}
    }
  }
  requestAnimationFrame(animate);
}

function showResult(winner){
  document.getElementById('result-name').textContent=winner.name;
  document.getElementById('result-desc').textContent=winner.power||(winner.desc?winner.desc.slice(0,100):'');
  createSparks();
  const flash=document.getElementById('winner-flash');
  flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'),800);
  // Animate result box
  const rb=document.querySelector('.result-box');
  rb.style.borderColor='var(--gold2)';rb.style.boxShadow='0 0 30px rgba(212,160,23,0.3)';
  setTimeout(()=>{rb.style.borderColor='';rb.style.boxShadow='';},2000);
}

function createSparks(){
  const c=document.getElementById('sparks');c.innerHTML='';
  const cols=['#f0c040','#c0392b','#d4a017','#fff','#e74c3c','#2ecc71'];
  for(let i=0;i<35;i++){
    const s=document.createElement('div');s.className='spark';
    const angle=Math.random()*Math.PI*2,dist=80+Math.random()*300,size=2+Math.random()*6;
    s.style.cssText=`left:50%;top:50%;width:${size}px;height:${size}px;background:${cols[Math.floor(Math.random()*cols.length)]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-delay:${Math.random()*0.4}s;animation-duration:${0.9+Math.random()*0.7}s`;
    c.appendChild(s);
  }
}

function loadWheel(type,data){
  currentType=type;
  items=data;
  angle=0;
  document.getElementById('type-label').textContent=LABELS[type]||'Ruleta';
  document.getElementById('center-icon').textContent=ICONS[type]||'🎰';
  document.getElementById('result-type').textContent=LABELS[type]||'Resultado';
  document.getElementById('result-name').textContent='—';
  document.getElementById('result-desc').textContent='Haz clic en el centro para girar';
  document.getElementById('waiting').style.display='none';
  document.getElementById('wheel-container').classList.add('show');
  drawWheel();
}

// ---- COMUNICACIÓN CON EL PANEL (localStorage) ----
function checkForCommands(){
  try{
    const cmd=localStorage.getItem('dbd_obs_cmd');
    if(cmd){
      const data=JSON.parse(cmd);
      const ts=data.timestamp||0;
      // Only process if command is fresh (< 5 seconds old)
      if(Date.now()-ts<5000){
        if(data.action==='load'&&data.type&&data.items){
          loadWheel(data.type,data.items);
          localStorage.removeItem('dbd_obs_cmd');
        }
        if(data.action==='spin'&&!spinning&&items.length){
          spinWheel();
          localStorage.removeItem('dbd_obs_cmd');
        }
      }
    }
  }catch(e){}
}
setInterval(checkForCommands,300);
</script>
</body>
</html>
